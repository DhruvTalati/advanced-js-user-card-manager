<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="users grid grid-cols-5 gap-6 px-6 bg-gray-900 flex items-center justify-center min-h-screen gap-4">

    </div>

    <button id="refreshBtn" class="fixed bottom-6 right-6 
           flex items-center gap-3 
           px-5 py-3 
           bg-blue-600 text-white 
           text-sm font-semibold 
           rounded-full shadow-lg 
           hover:bg-blue-700 transition z-50">

        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582M20 20v-5h-.581M5.11 9A7 7 0 0119 12M18.89 15A7 7 0 015 12" />
        </svg>

        <span>Refresh</span>

    </button>
    <script src="script.js"></script>
</body>

</html>
